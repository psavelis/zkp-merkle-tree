name: zk-heavy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  zk-bench:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run tests
        run: go test ./internal/zk/...
      - name: Run benchmarks
        run: go test -run '^$' -bench=. -benchmem ./internal/... | tee benchmark.txt
      - name: Training benchmark summary
        run: |
          {
            echo '## ZK Training Benchmark Report'
            echo
            echo '- Benchmarks were run for internal packages.'
            echo '- Use the artifact attached to this workflow to compare proving and Merkle performance across revisions.'
            echo
            echo '```text'
            cat benchmark.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: zk-benchmarks
          path: benchmark.txt

