name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Tidy check
        run: go mod tidy && git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...
      - name: CLI smoke
        run: go run ./cmd/zkp-merkle-demo verify --hash sha256 --proof-file ./testdata/sample-proof.json
      - name: Example smoke
        run: |
          go run ./examples/bitcoin-p2mr
          go run ./examples/zk-rollup
          go run ./examples/light-client-spv
          go run ./examples/bridge-exit
      - name: Training summary
        run: |
          total_cover=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          {
            echo '## Training CI Report'
            echo
            echo '| Category | Value |'
            echo '| --- | --- |'
            echo '| Go version | 1.25 |'
            echo "| Coverage | ${total_cover} |"
            echo
            echo '| Validated flow | Status |'
            echo '| --- | --- |'
            echo '| Generic Merkle proof verification | PASS |'
            echo '| Bitcoin-style selective reveal example | PASS |'
            echo '| ZK balance update with Merkle membership | PASS |'
            echo '| Light-client SPV inclusion example | PASS |'
            echo '| Bridge exit inclusion example | PASS |'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Build PR report fragment
        run: |
          total_cover=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          cat > ci-report.md <<EOF
          | Category | Value |
          | --- | --- |
          | Go version | 1.25 |
          | Coverage | ${total_cover} |
          | Checks passed | format, tidy, vet, unit tests, CLI smoke, examples |

          | Validated flow | Status |
          | --- | --- |
          | Generic Merkle proof verification | PASS |
          | Bitcoin-style selective reveal example | PASS |
          | ZK balance update with Merkle membership | PASS |
          | Light-client SPV inclusion example | PASS |
          | Bridge exit inclusion example | PASS |
          EOF
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-1.25
          path: coverage.out
      - name: Upload PR report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-1.25
          path: ci-report.md

  post-pr-comment:
    needs: go-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download PR report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          path: pr-reports
          merge-multiple: true
      - name: Build consolidated PR comment
        run: |
          {
            echo '<!-- ci-training-report -->'
            echo '## CI Training Report'
            echo
            echo "Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            cat pr-reports/ci-report.md
            echo
            echo '### What this run validates'
            echo
            echo '- The repository builds and tests on the project toolchain.'
            echo '- The CLI proof verification path works against the checked-in fixture.'
            echo '- The repository examples execute successfully in CI.'
            echo '- Coverage artifacts are attached to this workflow for inspection.'
          } > pr-comment.md
      - name: Create or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            const marker = '<!-- ci-training-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
